# docker-compose.prod.yml — run this one on EC2
services:
  review-pipeline:
    image: 857360184083.dkr.ecr.us-east-2.amazonaws.com/snowball/review-pipeline:9d4643d
    restart: unless-stopped
    environment:
      - AWS_DEFAULT_REGION=us-east-2
  analysis-pipeline:
    image: 857360184083.dkr.ecr.us-east-2.amazonaws.com/snowball/analysis-pipeline:8f21730
    restart: unless-stopped
    secrets:
      - EDGAR_IDENTITY
    environment:
      - AWS_DEFAULT_REGION=us-east-2
  orchestrator:
    image: 857360184083.dkr.ecr.us-east-2.amazonaws.com/snowball/orchestrator:9d4643d
    restart: unless-stopped
    environment:
      ANALYSIS_PIPELINE_URL: "http://analysis-pipeline:8000"
      REVIEW_PIPELINE_URL: "http://review-pipeline:8000"
    depends_on:
      - analysis-pipeline
      - review-pipeline
    ports:
      - "8080:8080"

secrets:
  EDGAR_IDENTITY:
    file: ./secrets/EDGAR_IDENTITY.txt